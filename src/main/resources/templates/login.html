<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ENVIRONMENT-BASED POLLUTION REPORTING SYSTEM</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: url('https://static.vecteezy.com/system/resources/previews/029/272/678/large_2x/crystal-globe-icon-for-environment-social-governance-concept-generative-ai-free-photo.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }

        .login-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 380px;
            padding: 35px 30px;
        }

        .login-card h4 {
            color: #1a6b3c;
            font-weight: 700;
        }

        .form-control {
            border-radius: 6px;
            padding: 10px;
        }

        .btn-login {
            background-color: #1a6b3c;
            color: white;
            font-weight: 600;
        }

        .btn-login:hover {
            background-color: #145a30;
        }

        .error {
            color: red;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .logout {
            color: green;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .text-link a {
            color: #1a6b3c;
            font-weight: 500;
            text-decoration: none;
        }

        .text-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <!-- Home Icon Link -->
        <div class="text-start mb-2">
            <a href="/" class="text-decoration-none d-inline-flex align-items-center" title="Back to Home">
                <i class="bi bi-house-fill fs-5 text-success me-1"></i>
                <span class="small text-success fw-semibold">Home</span>
            </a>
        </div>

        <div class="text-center mb-3">
            <img src="/images/logo1.JPG" alt="ENVIRONMENT-BASED POLLUTION REPORTING SYSTEM Logo" width="60" height="60" />
            <h4 class="mt-2 fs-5">ENVIRONMENT-BASED POLLUTION REPORTING SYSTEM</h4>
            <p class="text-muted small">Pollution Reporting System</p>
        </div>

        <!-- Notifications will be handled by SweetAlert below -->

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-login w-100 mt-2">Sign In</button>
        </form>

        <div class="text-center mt-3 text-link">
            <p>Don’t have an account? <a th:href="@{/register}">Create one</a></p>
        </div>
    </div>

</body>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:if="${param.error}">
        document.addEventListener("DOMContentLoaded", function() {
            Swal.fire({
                icon: 'error',
                title: 'Login Failed',
                text: 'Invalid username or password.',
                confirmButtonColor: '#1a6b3c'
            });
        });
    </script>
    <script th:if="${param.logout}">
        document.addEventListener("DOMContentLoaded", function() {
            Swal.fire({
                icon: 'success',
                title: 'Logged Out',
                text: 'You have been logged out successfully.',
                confirmButtonColor: '#1a6b3c'
            });
        });
    </script>
    <script th:if="${param.registered}">
        document.addEventListener("DOMContentLoaded", function() {
            Swal.fire({
                icon: 'success',
                title: 'Account Created!',
                text: 'Account created successfully! Please log in.',
                confirmButtonColor: '#1a6b3c'
            });
        });
    </script>
</html>
