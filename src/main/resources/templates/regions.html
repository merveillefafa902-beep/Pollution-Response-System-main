<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:replace="~{base :: layout(~{::content})}">
<th:block th:fragment="content">
    <div class="d-flex justify-content-between flex-wrap align-items-center mb-3">
        <h4 class="fw-bold mb-2">Regions Directory</h4>
        <div>
            <button class="btn btn-success shadow-sm" onclick="openRegionModal()">
                <i class="bi bi-plus-circle"></i> Add New Region
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h6 class="fw-bold text-success mb-3">Configured Regions</h6>
            <p class="text-muted small mb-3">Manage geographic areas used for case classification and responder coordination.</p>

            <div class="table-responsive">
                <table class="table table-hover align-middle" id="regionsTable">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Latitude</th>
                            <th>Longitude</th>
                            <th>Reports</th>
                            <th style="width:120px">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="regionsTbody">
                        <tr><td colspan="7" class="text-center text-muted py-4">Loading regions...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Region Modal -->
    <div class="modal fade" id="regionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="regionModalTitle">Add Region</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="regionForm" class="row g-3">
                        <input type="hidden" id="regionId" />
                        <div class="col-md-6">
                            <label class="form-label">Name<span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="regionName" required maxlength="80" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Description</label>
                            <input type="text" class="form-control" id="regionDesc" maxlength="200" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Latitude</label>
                            <input type="number" step="0.000001" class="form-control" id="regionLat" placeholder="-90 to 90" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Longitude</label>
                            <input type="number" step="0.000001" class="form-control" id="regionLon" placeholder="-180 to 180" />
                        </div>
                        <div class="col-12">
                            <small class="text-muted">Latitude & Longitude are optional; provide when known for mapping capabilities.</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="saveRegion()"><i class="bi bi-save"></i> Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let regionsCache = [];
        document.addEventListener('DOMContentLoaded', () => {
            loadRegions();
        });

        async function loadRegions(){
            try {
                const [regionsRes, statsRes] = await Promise.all([
                    fetch('/api/regions'),
                    fetch('/api/reports/stats/region')
                ]);
                if(!regionsRes.ok) throw new Error('Failed to load regions');
                const regions = await regionsRes.json();
                const stats = statsRes.ok ? await statsRes.json() : {};
                regionsCache = regions;
                renderRegions(regions, stats);
            } catch(err){
                console.error(err);
                const tbody = document.getElementById('regionsTbody');
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Error loading regions</td></tr>';
            }
        }

        function renderRegions(regions, stats){
            const tbody = document.getElementById('regionsTbody');
            if(regions.length === 0){
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No regions configured yet.</td></tr>';
                return;
            }
            tbody.innerHTML = regions.map(r => {
                const count = stats[r.name] || 0;
                return `<tr>
                    <td>${r.id}</td>
                    <td class="fw-semibold">${escapeHtml(r.name)}</td>
                    <td>${escapeHtml(r.description || '')}</td>
                    <td>${r.latitude ?? ''}</td>
                    <td>${r.longitude ?? ''}</td>
                    <td><span class="badge bg-success-subtle text-danger fw-semibold">${count}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" title="Edit" onclick="openRegionModal(${r.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-success" title="Delete" onclick="deleteRegion(${r.id}, '${escapeAttr(r.name)}')"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function openRegionModal(id){
            const modalEl = document.getElementById('regionModal');
            const modal = new bootstrap.Modal(modalEl);
            const title = document.getElementById('regionModalTitle');
            document.getElementById('regionForm').reset();
            document.getElementById('regionId').value = '';
            if(id){
                const region = regionsCache.find(r => r.id === id);
                if(region){
                    title.textContent = 'Edit Region';
                    document.getElementById('regionId').value = region.id;
                    document.getElementById('regionName').value = region.name;
                    document.getElementById('regionDesc').value = region.description || '';
                    document.getElementById('regionLat').value = region.latitude ?? '';
                    document.getElementById('regionLon').value = region.longitude ?? '';
                }
            } else {
                title.textContent = 'Add Region';
            }
            modal.show();
        }

        async function saveRegion(){
            const id = document.getElementById('regionId').value.trim();
            const name = document.getElementById('regionName').value.trim();
            const description = document.getElementById('regionDesc').value.trim();
            const latVal = document.getElementById('regionLat').value.trim();
            const lonVal = document.getElementById('regionLon').value.trim();
            if(!name){
                return alert('Name is required');
            }
            const latitude = latVal ? parseFloat(latVal) : null;
            const longitude = lonVal ? parseFloat(lonVal) : null;
            if(latitude !== null && (latitude < -90 || latitude > 90)) return alert('Latitude must be between -90 and 90');
            if(longitude !== null && (longitude < -180 || longitude > 180)) return alert('Longitude must be between -180 and 180');

            const payload = { name, description, latitude, longitude };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/regions/${id}` : '/api/regions';
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(!res.ok) throw new Error('Failed to save region');
                bootstrap.Modal.getInstance(document.getElementById('regionModal')).hide();
                loadRegions();
            } catch(err){
                alert('Error: ' + err.message);
            }
        }

        async function deleteRegion(id, name){
            if(!confirm(`Delete region "${name}"? This cannot be undone.`)) return;
            try {
                const res = await fetch(`/api/regions/${id}`, { method: 'DELETE' });
                if(!res.ok) throw new Error('Delete failed');
                loadRegions();
            } catch(err){
                alert('Error: ' + err.message);
            }
        }

        function escapeHtml(txt){
            const div = document.createElement('div');
            div.textContent = txt;
            return div.innerHTML;
        }
        function escapeAttr(txt){
            return txt.replace(/"/g,'&quot;');
        }
    </script>

</th:block>

</html>
