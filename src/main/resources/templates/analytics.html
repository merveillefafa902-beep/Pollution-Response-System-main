<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:replace="~{base :: layout(~{::content})}">
<th:block th:fragment="content">

    <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between mb-3 gap-2">
        <h4 class="fw-bold text-danger mb-0">Analytics & Reports</h4>
        <div class="d-flex flex-column flex-sm-row gap-2 w-100 w-md-auto">
            <button class="btn btn-outline-success btn-sm flex-fill flex-sm-grow-0" id="btnPdf">
                <i class="bi bi-filetype-pdf"></i> <span class="d-none d-sm-inline">Export </span>PDF
            </button>
            <button class="btn btn-outline-success btn-sm flex-fill flex-sm-grow-0" id="btnXlsx">
                <i class="bi bi-filetype-xls"></i> <span class="d-none d-sm-inline">Export </span>Excel
            </button>
        </div>
    </div>

    <div class="row g-2 g-md-3">
        <div class="col-12 col-md-6 col-xl-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-3">
                    <h6 class="fw-semibold text-muted mb-3 fs-6">Cases by Type</h6>
                    <div class="chart-container" style="position: relative; height: 250px;">
                        <canvas id="chartType"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-3">
                    <h6 class="fw-semibold text-muted mb-3 fs-6">Cases by Status</h6>
                    <div class="chart-container" style="position: relative; height: 250px;">
                        <canvas id="chartStatus"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-3">
                    <h6 class="fw-semibold text-muted mb-3 fs-6">Cases by Region</h6>
                    <div class="chart-container" style="position: relative; height: 250px;">
                        <canvas id="chartRegion"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-xl-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-3">
                    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-3 gap-2">
                        <h6 class="fw-semibold text-muted mb-0 fs-6">Cases Over Time</h6>
                        <select id="bucket" class="form-select form-select-sm" style="width:auto; min-width: 100px;">
                            <option value="day" selected>Daily</option>
                            <option value="hour">Hourly</option>
                        </select>
                    </div>
                    <div class="chart-container" style="position: relative; height: 250px;">
                        <canvas id="chartTime"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const api = {
                type: '/api/analytics/type',
                status: '/api/analytics/status',
                region: '/api/analytics/region',
                severity: '/api/analytics/severity',
                timeseries: (days, bucket) => `/api/analytics/timeseries?days=${days}&bucket=${bucket}`,
                exportPdf: '/api/exports/reports.pdf',
                exportXlsx: '/api/exports/reports.xlsx'
            };

            const colors = {
                status: ['#6c757d','#0d6efd','#fd7e14','#198754','#212529'],
                severity: ['#28a745','#ffc107','#fd7e14','#dc3545']
            };

            const charts = {};
            function renderPie(id, dataMap, palette){
                const labels = Object.keys(dataMap);
                const values = labels.map(k => dataMap[k]);
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(document.getElementById(id), {
                    type: 'doughnut',
                    data: { labels, datasets: [{ data: values, backgroundColor: palette }] },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { 
                                position: window.innerWidth < 576 ? 'bottom' : 'right',
                                labels: { 
                                    padding: window.innerWidth < 576 ? 10 : 15,
                                    font: { size: window.innerWidth < 576 ? 11 : 12 }
                                }
                            } 
                        } 
                    }
                });
            }
            function renderBar(id, dataMap){
                const labels = Object.keys(dataMap);
                const values = labels.map(k => dataMap[k]);
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(document.getElementById(id), {
                    type: 'bar',
                    data: { labels, datasets: [{ data: values, backgroundColor: '#b60000' }] },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display:false } }, 
                        scales: { 
                            y: { beginAtZero: true },
                            x: {
                                ticks: {
                                    font: { size: window.innerWidth < 576 ? 10 : 12 },
                                    maxRotation: window.innerWidth < 576 ? 45 : 0,
                                    minRotation: window.innerWidth < 576 ? 45 : 0
                                }
                            }
                        } 
                    }
                });
            }
            function renderLine(id, series){
                const labels = series.map(p => p.t);
                const values = series.map(p => p.count);
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(document.getElementById(id), {
                    type: 'line',
                    data: { labels, datasets: [{ data: values, borderColor: '#b60000', tension: .2, fill: false, pointRadius: window.innerWidth < 576 ? 3 : 4 }] },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display:false } }, 
                        scales: { 
                            y: { beginAtZero: true },
                            x: {
                                ticks: {
                                    font: { size: window.innerWidth < 576 ? 9 : 11 },
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            }
                        } 
                    }
                });
            }

            async function fetchJson(url){
                const r = await fetch(url);
                if(!r.ok){ console.warn('Analytics endpoint restricted or failed:', url, r.investigationStatus); return {}; }
                return await r.json();
            }

            async function loadAll(){
                const [byType, byStatus, byRegion] = await Promise.all([
                    fetchJson(api.type), fetchJson(api.investigationStatus), fetchJson(api.region)
                ]);
                renderBar('chartType', byType);
                renderPie('chartStatus', byStatus, colors.investigationStatus);
                renderBar('chartRegion', byRegion);

                const bucket = document.getElementById('bucket').value;
                const series = await fetchJson(api.timeseries(7, bucket));
                if(Array.isArray(series)) renderLine('chartTime', series);
            }

            loadAll();
            document.getElementById('bucket').addEventListener('change', loadAll);

            // Exports
            document.getElementById('btnPdf').addEventListener('click', () => window.open(api.exportPdf, '_blank'));
            document.getElementById('btnXlsx').addEventListener('click', () => window.open(api.exportXlsx, '_blank'));
        });
    </script>
</th:block>
</html>
