<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:replace="~{base :: layout(~{::content})}">
<th:block th:fragment="content">
    <div class="row g-4">
        <div class="col-12 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white">Report a Case</div>
                <div class="card-body">
                    <form id="reportForm" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Pollution Type</label>
                            <select class="form-select" name="pollutionCategory" id="pollutionCategorySelect" required>
                                <option value="">Select type</option>
                                <option value="Air Pollution">Air Pollution</option>
                                <option value="Water Pollution">Water Pollution</option>
                                <option value="Noise Pollution">Noise Pollution</option>
                                <option value="Soil Pollution">Soil Pollution</option>
                                <option value="Chemical Pollution">Chemical Pollution</option>
                                <option value="Waste Dumping">Waste Dumping</option>
                                <option value="Smoke Pollution">Smoke Pollution</option>
                                <option value="Other">Other Pollution Type</option>
                            </select>
                        </div>
                        <div class="mb-3 d-none" id="otherCategoryDiv">
                            <label class="form-label">Specify Pollution Type</label>
                            <input class="form-control" type="text" id="otherCategoryInput" placeholder="e.g. Bad odor, Toxic smoke" />
                        </div>
                        <div class="mb-3">
                            <label class="form-label d-flex align-items-center gap-2">
                                Severity
                                <span tabindex="0" class="text-info" style="cursor: help;" data-bs-toggle="popover" data-bs-trigger="hover focus" data-bs-html="true" title="Severity Levels" data-bs-content="
                                    &lt;strong&gt;Low 🟢&lt;/strong&gt;: Minor environmental issue with limited impact.&lt;br&gt;&lt;em&gt;Example: Small littering, minor waste accumulation, occasional bad smell.&lt;/em&gt;&lt;br&gt;&lt;br&gt;
                                    &lt;strong&gt;Medium 🟡&lt;/strong&gt;: Noticeable pollution affecting the surrounding area.&lt;br&gt;&lt;em&gt;Example: Illegal dumping, moderate water contamination, persistent noise pollution, smoke emissions.&lt;/em&gt;&lt;br&gt;&lt;br&gt;
                                    &lt;strong&gt;High 🟠&lt;/strong&gt;: Serious environmental problem requiring urgent attention.&lt;br&gt;&lt;em&gt;Example: Large waste dumping, significant air pollution, chemical discharge, major water pollution.&lt;/em&gt;&lt;br&gt;&lt;br&gt;
                                    &lt;strong&gt;Critical 🔴&lt;/strong&gt;: Dangerous situation posing immediate risk to people, animals, or the environment.&lt;br&gt;&lt;em&gt;Example: Toxic chemical spill, hazardous waste leak, major environmental disaster, fire causing severe pollution.&lt;/em&gt;
                                ">
                                    <i class="bi bi-info-circle-fill"></i>
                                </span>
                            </label>
                            <select class="form-select fw-bold" name="severity" id="severitySelect" required style="color: #d39e00;" onchange="this.style.color = this.options[this.selectedIndex].style.color;">
                                <option value="MEDIUM" style="color: #d39e00;" selected>Medium 🟡 - Noticeable pollution affecting the surrounding area</option>
                                <option value="LOW" style="color: #198754;">Low 🟢 - Minor environmental issue with limited impact</option>
                                <option value="HIGH" style="color: #fd7e14;">High 🟠 - Serious environmental problem requiring urgent attention</option>
                                <option value="CRITICAL" style="color: #dc3545;">Critical 🔴 - Dangerous situation posing immediate risk</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3" placeholder="What happened?" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input class="form-control" name="location" placeholder="Address or landmark (optional)" />
                        </div>
                        <input id="lat" name="latitude" type="hidden" required />
                        <input id="lng" name="longitude" type="hidden" required />
                        <div class="mb-3">
                            <label class="form-label">Photo/Video</label>
                            <input class="form-control" type="file" id="file" name="file" accept="image/*,video/mp4" />
                            <div class="form-text">Images or MP4 video up to 10MB.</div>
                        </div>
                        <div class="d-flex gap-2 mb-3">
                            <button type="button" class="btn btn-outline-secondary" id="useMyLocation"><i class="bi bi-geo"></i> Use my location</button>
                        </div>
                        <div id="dupAlert" class="alert alert-warning d-none"></div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Submit Report</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light">Pick Location</div>
                <div class="card-body">
                    <div id="map" style="height: 420px; border-radius: 8px; background:#eee"></div>
                    <div class="small text-muted mt-2">Drag the marker to the exact location or click on the map.</div>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${@environment.getProperty('app.features.googleMaps.enabled')} == 'true'"
            th:src="${'https://maps.googleapis.com/maps/api/js?key=' + @environment.getProperty('app.google.maps.apiKey')}"></script>
    <link th:if="${@environment.getProperty('app.features.googleMaps.enabled')} != 'true'" rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script th:if="${@environment.getProperty('app.features.googleMaps.enabled')} != 'true'" src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, marker;
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            
            if (typeof bootstrap !== 'undefined') {
                const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
                [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl));
            }
            document.getElementById('useMyLocation').addEventListener('click', useMyLocation);
            document.getElementById('reportForm').addEventListener('submit', submitReport);

            document.getElementById('pollutionCategorySelect').addEventListener('change', function() {
                const otherDiv = document.getElementById('otherCategoryDiv');
                const otherInput = document.getElementById('otherCategoryInput');
                if (this.value === 'Other') {
                    otherDiv.classList.remove('d-none');
                    otherInput.setAttribute('required', 'required');
                } else {
                    otherDiv.classList.add('d-none');
                    otherInput.removeAttribute('required');
                }
            });
        });

        function initMap(){
            if(window.google && google.maps){
                const center = { lat: -1.9441, lng: 30.0619 }; // Kigali
                map = new google.maps.Map(document.getElementById('map'), { center, zoom: 13 });
                marker = new google.maps.Marker({ position: center, map, draggable: true });
                google.maps.event.addListener(map, 'click', (e) => setLatLng(e.latLng.lat(), e.latLng.lng()));
                google.maps.event.addListener(marker, 'dragend', (e) => setLatLng(e.latLng.lat(), e.latLng.lng()));
                setLatLng(center.lat, center.lng);
            } else if (window.L){
                map = L.map('map').setView([-1.9441, 30.0619], 13);
                const satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], attribution: '© Google Maps' });
                const normLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap contributors' });
                satLayer.addTo(map);
                L.control.layers({"Satellite Map": satLayer, "Normal Map": normLayer}).addTo(map);
                marker = L.marker([-1.9441,30.0619], { draggable: true }).addTo(map);
                map.on('click', e => setLatLng(e.latlng.lat, e.latlng.lng));
                marker.on('dragend', () => { const p = marker.getLatLng(); setLatLng(p.lat, p.lng); });
                setLatLng(-1.9441, 30.0619);
            } else {
                // No map libs available; just rely on geolocation
                setLatLng('', '');
            }
        }

        function setLatLng(lat, lng){
            const latEl = document.getElementById('lat');
            const lngEl = document.getElementById('lng');
            latEl.value = lat;
            lngEl.value = lng;
            if(window.google && marker && marker.setPosition){ marker.setPosition({lat, lng}); }
            if(window.L && marker && marker.setLatLng){ marker.setLatLng([lat, lng]); }
        }

        function useMyLocation(){
            if(!navigator.geolocation){ return alert('Geolocation not supported'); }
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                setLatLng(lat, lng);
                if(map && map.setView){ map.setView([lat,lng], 16); }
                if(window.google && map && map.setCenter){ map.setCenter({lat, lng}); map.setZoom(16); }
            }, () => alert('Unable to get current location'));
        }

        async function submitReport(e){
            e.preventDefault();
            const form = document.getElementById('reportForm');
            const fd = new FormData(form);

            if (fd.get('pollutionCategory') === 'Other') {
                const otherVal = document.getElementById('otherCategoryInput').value.trim();
                if (!otherVal) return alert('Please specify the pollution type');
                fd.set('pollutionCategory', otherVal);
            }

            try{
                const res = await fetch('/api/reports/with-media', { method: 'POST', body: fd });
                if(res.status === 409){
                    const data = await res.json();
                    document.getElementById('dupAlert').classList.remove('d-none');
                    document.getElementById('dupAlert').innerHTML = 'Duplicate detected. Your report was not submitted. If the situation is different, please adjust details.';
                    return;
                }
                if(!res.ok) throw new Error('Submission failed');
                alert('Report submitted successfully. Thank you!');
                window.location.href = '/my-reports';
            } catch(err){
                alert('Error: ' + err.message);
            }
        }
    </script>
</th:block>
</html>
