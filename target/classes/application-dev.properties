# ===============================
# Dev Profile - H2 File-Based Database
# ===============================
# File-based H2 persists data between restarts (stored in ./data/devdb.mv.db)

spring.datasource.url=jdbc:h2:file:./data/devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 console (access at http://localhost:8080/h2-console)
# Use JDBC URL: jdbc:h2:file:./data/devdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep same server port
server.port=8080

